<script>
	const USE_IMGUR_MOCK = true;
	let capturedBlob = null;
	const NO_MANAGER_SPACE = '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;';

	$(document).ready(function ($) {
		// TODO Crear objeto que carga la información (mock por ahora) y pintarla
		loadCupData();

		// Acción principal INICIO. Captura imagen del div con nombre 'gprcup-content-img' y lo manda a imgur mostrando la barra de progreso
		$("#btnCapture").on("click", function () {
			const $btn = $(this);
			$btn.prop("disabled", true);

			const $el = $("#gprcup-content-img");
			// Forzamos el fondo real del html
			$el.addClass("capture-mode");

			html2canvas($el[0], {
				useCORS: true,
				backgroundColor: null, //"#fff"
				scale: window.devicePixelRatio
			}).then(function (canvas) {
				// === PREVIEW ===
				const dataUrl = canvas.toDataURL("image/png");
				$("#canvas-preview").attr("src", dataUrl);

				$("#previewModal").fadeIn(200);

				canvas.toBlob(function (blob) {
					capturedBlob = blob;
				}, "image/png");

				$btn.prop("disabled", false);

			}).finally(function () {
				$el.removeClass("capture-mode");
			});
		});
		// Acción principal FIN

		// Confirmar / cancelar INICIO
		// Confirmar
		$("#confirmUpload").on("click", function () {

			$("#upload-overlay").show();
			$(".modal-actions").hide();

			uploadCanvasToImageKit(capturedBlob, $("#btnCapture"));
		});

		// Cancelar
		$("#cancelUpload").on("click", function () {
			closeModal();
		});
		// Confirmar / cancelar FIN

		// Close (X)
		$("#closeModal").on("click", function () {
			closeModal();
		});

		$("#copyUrlBtn").on("click", function() {
			const text = $("#image-url-text").text();

			navigator.clipboard.writeText(text).then(function() {

				const $btn = $("#copyUrlBtn");
				$btn.html('<i class="fa-solid fa-check"></i>');

				setTimeout(function(){
					$btn.html('<i class="fa-solid fa-copy"></i>');
				}, 1500);

			}).catch(function(err){
				console.error("Error copiando:", err);
			});

		});

		$("#image-url-text").on("click", function() {
			navigator.clipboard.writeText($(this).text().then(function(){
				const $btn = $("#copyUrlBtn");
				$btn.html('<i class="fa-solid fa-check"></i>');

				setTimeout(function(){
					$btn.html('<i class="fa-solid fa-copy"></i>');
				}, 1500);
			}));
		});

	});

	function closeModal() {
		$("#previewModal").fadeOut(200);
		capturedBlob = null;
	}

	// Subida a ImageKit INICIO
	function uploadCanvasToImageKit(blob, $btn) {
		const IMAGEKIT_UPLOAD_URL = "https://upload.imagekit.io/api/v1/files/upload";

		$.get("http://localhost:9090/imagekit/auth", function (auth) {
			console.log("token:" + auth.token);
			console.log("signature:" + auth.signature);
			console.log("expire:" + auth.expire);
			console.log("publicKey:" + auth.publicKey);

			const formData = new FormData();
			formData.append("file", blob);
			// TODO Cambiar este nombre y meter un parámetro aleatorio
			//formData.append("fileName", "S109.01.04.03.png");
			debugger;
			var imgName = $("#id-hidden-captured-image-name").text();
			formData.append("fileName", imgName);

			formData.append("publicKey", auth.publicKey);
			formData.append("signature", auth.signature);
			formData.append("expire", auth.expire);
			formData.append("token", auth.token);
			$.ajax({
				url: IMAGEKIT_UPLOAD_URL,
				method: "POST",
				data: formData,
				processData: false,
				contentType: false,
				success: function (response) {
					debugger;
					$("#upload-overlay").hide();
					$(".modal-actions").show();

					
					const imageUrl = response.url;
					const bbcode = `[img]${imageUrl}[/img]`;

					$("#image-url-text").text(bbcode);
					//$("#uploaded-url").show();
					
				},
				error: function (err) {
					$("#upload-overlay").hide();
					$(".modal-actions").show();
				}
			})
		});


	}

		const totalDuration = 5000;   // 5 segundos

		const totalSteps = totalDuration / intervalTime;
		let currentStep = 0;

		updateProgress(0, "Subiendo imagen… 0%");

		const interval = setInterval(function () {
			currentStep++;

			const percent = Math.min(
				Math.round((currentStep / totalSteps) * 100),
				100
			);

			updateProgress(percent, "Subiendo imagen… " + percent + "%");

			if (currentStep >= totalSteps) {
				clearInterval(interval);

				// Simulación de respuesta Imgur

	// Función que se encarga de pintar la casilla del manager en función de la fase en la que se encuentre (cuartos, semis o final)
	function paintManager(idElement, manager = null, phase) {
		$("#" + idElement).html('');// Limpiamos

		// Pintamos un hueco porque no hay manager todavía
		if (manager === null || !manager.idManager) {
			$("#" + idElement).html(NO_MANAGER_SPACE);
			return;
		}

		var managerCups = manager.cups;

		// Pintamos un manager
		var widthImage = 0;
		var heightImage = 0;
		if (phase === 'Q') {
			widthImage = 40;
			heightImage = 40;
		}
		else if (phase === 'S') {
			widthImage = 60;
			heightImage = 60;
		}
		else if (phase === 'F') {
			widthImage = 70;
			heightImage = 70;
		}
		else if (phase === 'W') {
			widthImage = 80;
			heightImage = 80;
			managerCups += 1;
		}

		var content = '<div><img src="/avatars/' + manager.codeManager + '.jpg" width="' + widthImage + '" height="' + heightImage + '" alt="' + manager.codeManager + '" title="' + manager.codeManager + '">';
		// Pintamos la copa
		if (managerCups > 0) {
			var cupStyle = (managerCups >= 10) ? 'wcup' : 'cup';
			content += '<span class="' + cupStyle + '">' + managerCups + '</span>';
		}
		content += '</div>';
		$("#" + idElement).html(content);
	}

	// Función que se encarga de pintar la copa si ya hay un ganador
	function paintWinnerCup(idElement, winner = null) {
		$("#" + idElement).html('');// Limpiamos
		var cupHtml = '&nbsp;';
		if (winner !== null && winner.idManager) {
			cupHtml = '<img src="/images/scup.gif" width="12" height="12">';
		}
		$("#" + idElement).html(cupHtml);
	}

	// Función que se encarga de pintar las posiciones de un manager
	// paintManagerPositions("id-td-manager-qf-01-position", response.quarterFinals.managerQF01.positions);
	function paintManagerPositions(idElement, positions = null) {
		// Si no hay posiciones o no es un array no hacemos nada
		if (!Array.isArray(positions)) {
			return;
		}

		// Si hay posiciones pero está vacío
		if (!(positions.length > 0)) {
			return;
		}

		// Recorremos las posiciones
		positions.forEach(function (element, index) {
			var positionIndex = (index + 1);
			var elementName = "#" + idElement + "-" + positionIndex;
			$(elementName).html('');
			$(elementName).html(toOrdinal(element.position));
		});
	}

	// Función que se encarga de pintar las puntuaciones de cada manager
	function paintManagerScore(idElement, manager = null) {
		if (manager === null) {
			return;
		}
		if (manager.score === null) {
			return;
		}

		// Pintamos la posición
		$("#" + idElement).html('');// Limpiamos
		$("#" + idElement).html(manager.score);

		// Si este manager es el ganador, cambiamos el estilo
		if (manager.winsRound !== null) {
			if (manager.winsRound) {
				$("#" + idElement).removeClass("score");
				$("#" + idElement).addClass("scoreW");
			}
			else {
				$("#" + idElement).removeClass("scoreW");
				$("#" + idElement).addClass("score");
			}
		}

	}

	// Función para obtener el ordinal a partir de un cardinal en inglés
	function toOrdinal(n) {
		const s = ["th", "st", "nd", "rd"];
		const v = n % 100;

		return n + (s[(v - 20) % 10] || s[v] || s[0]);
	}
